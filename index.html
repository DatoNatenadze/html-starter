<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valentine?</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #fff0f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    .video-wrapper {
      margin-top: 40px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      overflow: hidden;
      border: 6px solid #ffb6c1;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .video-wrapper video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      margin: 24px 16px;
      font-size: 1.6rem;
      color: #c2185b;
    }

    .buttons {
      position: relative;
      width: 300px;
      height: 160px;
    }

    button {
      position: absolute;
      width: 120px;
      height: 50px;
      font-size: 1.1rem;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    #yesBtn {
      background: #4caf50;
      color: white;
      left: 10px;
      bottom: 10px;
    }

    #noBtn {
      background: #f44336;
      color: white;
      right: 10px;
      bottom: 10px;
    }

    .eheeee {
      position: fixed;
      font-size: 2rem;
      font-weight: bold;
      color: #ff4081;
      animation: floatCrazy 0.8s infinite alternate ease-in-out;
      pointer-events: none;
    }

    @keyframes floatCrazy {
      from { transform: translateY(0) rotate(-6deg); }
      to { transform: translateY(-25px) rotate(6deg); }
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="video-wrapper" id="videoWrapper">
    <video autoplay muted loop playsinline>
      <source src="./video.mp4" type="video/mp4">
    </video>
  </div>

  <h1 id="question">Will you be my valentine?</h1>

  <div class="buttons" id="buttons">
    <button id="yesBtn">Yes</button>
    <button id="noBtn">No</button>
  </div>

  <canvas id="confetti"></canvas>

  <script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const container = document.getElementById("buttons");
    const videoWrapper = document.getElementById("videoWrapper");
    const question = document.getElementById("question");

    const canvas = document.getElementById("confetti");
    const ctx = canvas.getContext("2d");
    canvas.width = innerWidth;
    canvas.height = innerHeight;

    function playWeirdSound() {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "sawtooth";
      osc.frequency.value = 300 + Math.random() * 900;
      gain.gain.value = 0.25;

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start();
      osc.stop(audioCtx.currentTime + 0.15);
    }

    function vibratePhone() {
      if (navigator.vibrate) {
        navigator.vibrate([60, 40, 60]);
      }
    }

    function teleportNo() {
      const maxX = container.clientWidth - noBtn.offsetWidth;
      const maxY = container.clientHeight - noBtn.offsetHeight;

      noBtn.style.left = Math.random() * maxX + "px";
      noBtn.style.top = Math.random() * maxY + "px";
      noBtn.style.right = "auto";
      noBtn.style.bottom = "auto";
    }

    function spawnEheeee() {
      const el = document.createElement("div");
      el.className = "eheeee";
      el.textContent = "EHEEEEE";

      el.style.left = Math.random() * (innerWidth - 120) + "px";
      el.style.top = Math.random() * (innerHeight - 120) + "px";

      document.body.appendChild(el);
      setTimeout(() => el.remove(), 5000);
    }

    let confetti = [];

    function launchConfetti() {
      confetti = Array.from({ length: 180 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height - canvas.height,
        r: Math.random() * 6 + 2,
        s: Math.random() * 6 + 3
      }));
      requestAnimationFrame(drawConfetti);
    }

    function drawConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      confetti.forEach(c => {
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
        ctx.fillStyle = `hsl(${Math.random() * 360},100%,50%)`;
        ctx.fill();
        c.y += c.s;
      });
      confetti = confetti.filter(c => c.y < canvas.height + 20);
      if (confetti.length) requestAnimationFrame(drawConfetti);
    }

    function handleNo(e) {
      e.preventDefault();
      playWeirdSound();
      vibratePhone();
      spawnEheeee();
      teleportNo();
    }

    noBtn.addEventListener("touchstart", handleNo);
    noBtn.addEventListener("click", handleNo);

    yesBtn.addEventListener("click", () => {
      launchConfetti();

      document.body.innerHTML = `
        <div style="
          display:flex;
          flex-direction:column;
          align-items:center;
          justify-content:center;
          min-height:100vh;
        ">
          ${videoWrapper.outerHTML}
          <h1 style="color:#4caf50;font-size:2.5rem;margin-top:24px;">
            vamossssss
            makoce
          </h1>
        </div>
      `;
    });
  </script>

</body>
</html>
